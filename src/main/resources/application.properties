# BIT235 Assessment 2 Part A – Wiki Administrator Login
#
# Spring Boot configuration file.
# Spring Boot automatically loads this file on startup.

# -----------------------------------------------
# Server Configuration
# -----------------------------------------------

# Port the embedded Tomcat server listens on (default is 8080)
server.port=8080

# -----------------------------------------------
# Application Name
# -----------------------------------------------

# Application name – used in logs and Spring Boot Actuator (if enabled)
spring.application.name=wiki-admin

# -----------------------------------------------
# Thymeleaf Configuration
# -----------------------------------------------

# Prefix: where to find Thymeleaf templates (classpath = src/main/resources)
spring.thymeleaf.prefix=classpath:/templates/

# Suffix: file extension for template files
spring.thymeleaf.suffix=.html

# Cache: set to false in development so changes to templates are picked up immediately
# Change to true in production for better performance
spring.thymeleaf.cache=false

# -----------------------------------------------
# Logging
# -----------------------------------------------

# Set log level to INFO for the application package
logging.level.com.wiki.admin=INFO
